# 各服务 gRPC 地址（demo）
#
# 启用 Nginx LB（./tools/run_servers.sh 默认）时：
#   下方 *_address 为 Nginx 对外端口；client 只连这里。
#   后端实例 bind 在 15052/15062、15053/15063、15054/15064（脚本 RE_LISTEN_ADDRESS）。
#
# 单实例无 LB：USE_LB=0 ./tools/run_servers.sh，进程直接 bind 下面端口。

ranking_address=127.0.0.1:50052
video_address=127.0.0.1:50053
browse_address=127.0.0.1:50054
recommend_count=8
ranking_connect_timeout_sec=5
video_connect_timeout_sec=5
browse_connect_timeout_sec=5
