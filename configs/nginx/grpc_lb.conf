# gRPC 七层负载均衡（需 nginx 编译含 http_v2 + grpc 模块，如 nginx-extras）
#
# 客户端 / Agent 连 LB 端口（与 services.conf 中 *_address 一致）：
#   ranking 50052  video 50053  browse 50054
# 后端实例由 run_servers.sh 起在 15xxx 端口（RE_LISTEN_ADDRESS）。

worker_processes 1;
error_log logs/error.log info;
pid nginx.pid;

events {
  worker_connections 8192;
}

http {
  access_log logs/access.log;

  upstream ranking_backend {
    server 127.0.0.1:15052;
    server 127.0.0.1:15062;
  }

  upstream video_backend {
    server 127.0.0.1:15053;
    server 127.0.0.1:15063;
  }

  upstream browse_backend {
    server 127.0.0.1:15054;
    server 127.0.0.1:15064;
  }

  server {
    listen 127.0.0.1:50052 http2;
    location / {
      grpc_pass grpc://ranking_backend;
    }
  }

  server {
    listen 127.0.0.1:50053 http2;
    location / {
      grpc_pass grpc://video_backend;
    }
  }

  server {
    listen 127.0.0.1:50054 http2;
    location / {
      grpc_pass grpc://browse_backend;
    }
  }
}
