# gRPC 四层 TCP 负载均衡（stream 模块，Ubuntu nginx-extras 自带）
# 对外端口与 services.conf 中 *_address 一致；后端为 15xxx 实例。

load_module /usr/lib/nginx/modules/ngx_stream_module.so;

worker_processes 1;
error_log logs/error.log info;
pid nginx.pid;

events {
  # 1000 Agent 压测时每条 stream 连接占 client+upstream 两个 slot
  worker_connections 8192;
}

stream {
  upstream ranking_backend {
    server 127.0.0.1:15052;
    server 127.0.0.1:15062;
  }

  upstream video_backend {
    server 127.0.0.1:15053;
    server 127.0.0.1:15063;
  }

  upstream browse_backend {
    server 127.0.0.1:15054;
    server 127.0.0.1:15064;
  }

  server {
    listen 127.0.0.1:50052;
    proxy_pass ranking_backend;
  }

  server {
    listen 127.0.0.1:50053;
    proxy_pass video_backend;
  }

  server {
    listen 127.0.0.1:50054;
    proxy_pass browse_backend;
  }
}
